<h2>Usuarios</h2>

<table>
  <thead>
    <tr>
      <th>Email</th>
      <th>Rol</th>
      <th>Puntos</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let user of users()">
      <td>{{ user.email }}</td>
      <td>{{ user.role }}</td>
      <td>{{ user.points }}</td>
    </tr>
  </tbody>
</table>

<div class="form-box">
  <h3>Crear usuario</h3>

  <div class="form-grid">
    <input placeholder="Nombre" [(ngModel)]="newUser.name" /><br />
    <input placeholder="Email" [(ngModel)]="newUser.email" /><br />
    <input placeholder="DNI" [(ngModel)]="newUser.dni" /><br />
    <input placeholder="Password" [(ngModel)]="newUser.password" /><br />

    <select [(ngModel)]="newUser.roleId">
      <option [value]="1">USER</option>
      <option [value]="2">ADMIN</option>
    </select>
  </div>

  <p *ngIf="!isFormValid()" class="warning">Completa todos los campos correctamente</p>

  <button (click)="createUser()" [disabled]="!isFormValid()">Crear</button>
</div>

<p *ngIf="errorMessage" style="color: red">
  {{ errorMessage }}
</p>
