<div class="login-wrapper">
  <div class="logo-container">
    <img src="assets/logo.png" alt="logo" />
  </div>
  <div class="login-card">
    <h2>Iniciar sesión</h2>

    <form (ngSubmit)="login()">
      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="Email"
        required
        [class.invalid]="submitted && !email"
      />

      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="Contraseña"
        required
        [class.invalid]="submitted && !password"
      />

      <button type="submit" [disabled]="loading">Ingresar</button>
      <p *ngIf="errorMessage" class="error">
        {{ errorMessage }}
      </p>
    </form>
  </div>
</div>
